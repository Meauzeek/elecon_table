<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="《随星录》元素使与关联人物交互设定集">
  <title>随星录 · 元素人物志</title>
  <link rel="stylesheet" href="styles.css?v=2.1">
</head>
<body data-theme="acs" data-mode="light">
  <header class="masthead">
    <a class="brand" href="#top" aria-label="返回顶部">
      <span class="brand-cn">随星録</span><span class="brand-divider">｜</span><span class="brand-en">STELLAGRAM OF WHIMSIES</span>
    </a>
    <nav class="toolbar" aria-label="显示设置">
      <label class="search"><span>⌕</span><input id="search" type="search" placeholder="姓名 / 符号 / 元素" autocomplete="off"></label>
      <label class="select-wrap">主题<select id="theme-select">
        <option value="smart">智能切换</option><option value="acs">ACS 档案馆</option>
        <option value="antarctic">南极观测站</option><option value="aero">Aëterna / Aero</option>
        <option value="juno">Juno / 甜蜜警戒</option><option value="scp">SCP / 基金会</option>
      </select></label>
      <label class="select-wrap">标记<select id="filter-select"><option value="off">关闭</option><option value="theme">主题归属</option><option value="gender">性别</option><option value="nation">国家 / 地区</option><option value="age">年龄段</option></select></label>
      <label class="select-wrap">团体<select id="group-select"><option value="all">全部团体</option></select></label>
      <button id="color-toggle" class="icon-btn text-btn active" type="button" aria-pressed="true">角色色</button>
      <button id="mode-toggle" class="icon-btn" type="button" aria-label="切换夜间模式">◐</button>
      <button id="debug-toggle" class="icon-btn" type="button" aria-label="进入调试模式">⚙</button>
    </nav>
  </header>

  <main id="top">
    <section class="hero">
      <div class="hero-grid">
        <div><h1>元素人物志</h1></div>
        <div class="hero-stats"><div><strong id="record-count">—</strong><span>已收录角色</span></div><div><strong>5×2</strong><span>主题与昼夜模式</span></div><div><strong>126</strong><span>观测上限</span></div></div>
      </div>
      <div id="legend" class="legend"><span><i class="dot active"></i>已有档案</span><span><i class="dot vacant"></i>未观测</span><span><i class="dot special"></i>特殊序号</span><span>悬停带有 <b>＋</b> 的格子可展开关联个体</span></div>
      <div class="theme-palette" aria-label="人物主题归属色卡"><span><i style="--swatch:#1769AA"></i>ACS</span><span><i style="--swatch:#79BFE5"></i>南极</span><span><i style="--swatch:#52B9A6"></i>Aëterna / Aero</span><span><i style="--swatch:#E85A9B"></i>Juno</span><span><i style="--swatch:#8B1A1A"></i>SCP</span></div>
    </section>

    <section class="table-section" aria-labelledby="table-title">
      <div class="section-head"><div><span class="index">01</span><h2 id="table-title">元素使周期表</h2></div><p>横向滑动以查看完整表格</p></div>
      <div class="table-scroll"><div id="periodic-table" class="periodic-table" role="grid" aria-label="元素使周期表"></div></div>
      <div class="series-label"><span>镧系 / LANTHANIDES</span><span>锕系 / ACTINIDES</span></div>
    </section>

    <section class="off-grid" aria-labelledby="off-title">
      <div class="section-head"><div><span class="index">02</span><h2 id="off-title">表外个体</h2></div><p>双字母代号 · 非元素使 / 衍生意识 / 紧密关系人</p></div>
      <div id="off-grid" class="off-grid-list"></div>
    </section>

  </main>

  <dialog id="profile-dialog" class="profile-dialog">
    <button class="dialog-close" type="button" aria-label="关闭">×</button>
    <div id="profile-content"></div>
  </dialog>
  <aside id="debug-bar" class="debug-bar" hidden><b>调试模式</b><span>可编辑空白元素与现有档案。</span><button id="add-off-grid" type="button">新增表外人物</button><button id="delete-entry" type="button">删除当前条目</button><button id="export-edits" type="button">导出修改 JS</button><button id="exit-debug" type="button">退出</button></aside>
  <div id="juno-floaters" class="juno-floaters" aria-hidden="true"></div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="data.js?v=2.1"></script>
  <script src="app.js?v=2.1"></script>
</body>
</html>
